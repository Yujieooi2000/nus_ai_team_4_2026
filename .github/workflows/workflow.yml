name: workflow.yml

on:
  push:
    branches: [ "main" ]

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ghcr.io/yujieooi2000/nus_ai_team_4_2026:latest .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}:latest