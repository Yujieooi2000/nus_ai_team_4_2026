name: Deploy to EKS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 📦 Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 🐳 Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: yujieooi2000   # 🔥 force lowercase
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🐳 Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/yujieooi2000/nus_ai_team_4_2026:latest .

      # 🐳 Push Docker image
      - name: Push Docker image
        run: |
          docker push ghcr.io/yujieooi2000/nus_ai_team_4_2026:latest

      # ☸️ Configure AWS credentials
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ☸️ Install kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # ☸️ Connect to EKS
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }}

      # ☸️ Deploy to Kubernetes
      - name: Deploy to EKS
        run: |
          kubectl apply -f deployment/deployment.yaml -n backend
          kubectl apply -f deployment/service.yaml -n backend

      # 🔄 Force rollout (important for latest tag)
      - name: Restart deployment
        run: |
          kubectl rollout restart deployment nus-ai -n backend