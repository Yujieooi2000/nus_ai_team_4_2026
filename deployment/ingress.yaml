apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nus-ai-ingress
spec:
  rules:
    - host: ai.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nus-ai-service
                port:
                  number: 80